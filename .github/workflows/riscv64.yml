name: riscv64

on:
  workflow_dispatch:

jobs:
  RunBasicTests:
    runs-on: [self-hosted, linux, riscv64]
    strategy:
      matrix:
        php: [ '8.2', '8.3', '8.4', '8.5', '8.6' ]
        backend:
          - riscv64
          - none

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Extension
        run: |
          /opt/bin/phpize${{ matrix.php }}
          ./configure --with-php-config=/opt/bin/php-config${{ matrix.php }} --enable-ort-backend=${{ matrix.backend }}
          make -j$(nproc)
          sudo make install

      - name: Run Tests
        run: |
          make test

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: tests-php${{ matrix.php }}-${{ matrix.backend }}
          path: tests/
  BuildCoverallsReport:
    runs-on: [self-hosted, linux, riscv64]
    needs: [RunBasicTests]

    strategy:
      matrix:
        php: [ '8.2', '8.3', '8.4', '8.5', '8.6' ]
        backend:
          - riscv64
          - none

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Extension
        run: |
          /opt/bin/phpize${{ matrix.php }}
          ./configure --with-php-config=/opt/bin/php-config${{ matrix.php }} --enable-ort-backend=${{ matrix.backend }}
          make -j$(nproc)
          sudo make install

      - name: Run Coverage
        run: |
          ORT_SCALE_CORES=1 make ort-test-coverage-html

      - name: Upload HTML Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-php-${{ matrix.php }}-backend-${{ matrix.backend }}
          path: html/

      - name: Send Coveralls Report
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: ${{ github.workspace }}/coverage.info
          flag-name: backend-${{ matrix.backend }}
          parallel: true
  FinishCoverallsReport:
    if: always()
    runs-on: [self-hosted, linux, riscv64]
    continue-on-error: true
    needs: [BuildCoverallsReport]
    steps:
    - name: Finish Coveralls Reporting
      uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel-finished: true
        carryforward: "backend-none, backend-riscv64"
