name: Continous PHP Build

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  arm64:
    runs-on: arm64
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5', '8.6']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Build
        run: PHP_VERSION=${{ matrix.php }} ./.github/scripts/php.sh

  riscv64:
    runs-on: riscv64
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5', '8.6']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Build
        run: PHP_VERSION=${{ matrix.php }} ./.github/scripts/php.sh

  x64-linux:
    runs-on: [self-hosted, X64, Linux]
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5', '8.6']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Build
        run: PHP_VERSION=${{ matrix.php }} ./.github/scripts/php.sh

  x64-mac:
    runs-on: [self-hosted, x64, macOS]
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5', '8.6']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Build
        run: PHP_VERSION=${{ matrix.php }} ./.github/scripts/php.sh
