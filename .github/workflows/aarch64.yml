name: aarch64

on:
  push:
    branches: [ develop, release ]
  pull_request:
    branches: [ develop, release ]
jobs:
  RunBasicTests:
    runs-on: ubuntu-latest-arm64 
    strategy:
      matrix:
        php: [ '8.1', '8.2', '8.3', '8.4' ]
        backend:
          - neon
          - none
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Cache ONNX Runtime
        id: cache-ort
        uses: actions/cache@v4
        with:
          path: /onnxruntime-linux-aarch64-1.22.0.tgz
          key: onnxruntime-1.22.0-${{ runner.os }}-aarch64

      - name: Download ONNX Runtime
        if: steps.cache-ort.outputs.cache-hit != 'true'
        run: |
          sudo wget https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-linux-aarch64-1.22.0.tgz -O /onnxruntime-linux-aarch64-1.22.0.tgz

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential re2c autoconf pkg-config lcov gcc
          sudo tar -C /usr/local --strip-components=1 -xvzf /onnxruntime-linux-aarch64-1.22.0.tgz
          sudo ldconfig
      - name: Install Extension
        run: |
          phpize
          case "${{ matrix.backend }}" in
            neon)
              ./configure --enable-ort-neon --disable-ort-avx2 --disable-ort-sse41 --disable-ort-sse2 --with-ort-onnx
              ;;
            none)
              ./configure --disable-ort-backend --with-ort-onnx
              ;;
          esac
          make -j$(nproc)
          sudo make install

      - name: Run Tests
        run: |
          make test

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: tests-php${{ matrix.php }}-${{ matrix.backend }}
          path: tests/
  BuildCoverallsReport:
    runs-on: ubuntu-latest-arm64

    strategy:
      matrix:
        php: [ '8.1', '8.2', '8.3', '8.4' ]
        backend:
          - neon
          - none

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Cache ONNX Runtime
        id: cache-ort
        uses: actions/cache@v4
        with:
          path: /onnxruntime-linux-aarch64-1.22.0.tgz
          key: onnxruntime-1.22.0-${{ runner.os }}-aarch64

      - name: Download ONNX Runtime
        if: steps.cache-ort.outputs.cache-hit != 'true'
        run: |
          sudo wget https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-linux-aarch64-1.22.0.tgz -O /onnxruntime-linux-aarch64-1.22.0.tgz

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential re2c autoconf pkg-config lcov gcc
          sudo tar -C /usr/local --strip-components=1 -xvzf /onnxruntime-linux-aarch64-1.22.0.tgz
          sudo ldconfig
      - name: Install Extension
        run: |
          phpize
          case "${{ matrix.backend }}" in
            neon)
              ./configure --enable-ort-neon --disable-ort-avx2 --disable-ort-sse41 --disable-ort-sse2 --with-ort-onnx
              ;;
            none)
              ./configure --disable-ort-backend --with-ort-onnx
              ;;
          esac
          make -j$(nproc)
          sudo make install

      - name: Run Coverage
        run: |
          ORT_POOL_CORES=1 make ort-test-coverage-html

      - name: Upload HTML Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-php-${{ matrix.php }}-backend-${{ matrix.backend }}
          path: html/

      - name: Send Coveralls Report
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: ${{ github.workspace }}/coverage.info
          flag-name: backend-${{ matrix.backend }}
          parallel: true
  FinishCoverallsReport:
    if: always()
    runs-on: ubuntu-latest
    needs: [BuildCoverallsReport]
    steps:
    - name: Finish Coveralls Reporting
      uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel-finished: true
        carryforward: "backend-none, backend-neon"
